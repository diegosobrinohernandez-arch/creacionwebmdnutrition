name: Descargar imagenes MD Nutrition

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  descargar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Descargar imagenes
        run: python3 scripts/descargar_imagenes.py data/md_nutrition_imagenes.json imagenes_md_nutrition

      - name: Commit y push de las imagenes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add imagenes_md_nutrition data/md_nutrition_imagenes_local.json
          git diff --staged --quiet || git commit -m "Descarga automatica de imagenes de productos MD Nutrition"
          git push
